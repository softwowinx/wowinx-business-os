<style>
  :root{
    --bg:#f4f2ec; --bg2:#faf8f3; --surface:#ffffff; --surface2:#faf8f3; --overlay:#f0ede4;
    --line:#e4e0d6; --line2:#d6d1c4;
    --ink:#1c1f24; --muted:#454b54; --faint:#6b7280;
    --corp:#9a7d3f; --corp2:#876d35;
    --wx:#b06a2c; --wx-soft:rgba(176,106,44,.10);
    --vr:#2f7d96; --vr-soft:rgba(47,125,150,.10);
    --neutral:#8c93a0;
    --acc:var(--corp); --acc-soft:rgba(154,125,63,.12);
    --t-referencia:#6b7280; --t-benchmark:#2f7d96; --t-hipotesis:#6d5cc0; --t-decision:#3b7d62;
    --t-senal:#4f6f9c; --t-riesgo:#b4453f; --t-supuesto:#9a6b3f; --t-criterio:#9a7d3f; --t-pendiente:#9a6b1f;
    --radius:13px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 540px at 82% -8%, rgba(154,125,63,.06), transparent 60%),
      radial-gradient(820px 460px at -5% 0%, rgba(47,125,150,.05), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;
    line-height:1.55; font-size:16px;
  }
  ::selection{background:rgba(154,125,63,.22);color:#23262b}
  *::-webkit-scrollbar{width:9px;height:9px}
  *::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
  a{color:inherit}
  .mono{font-family:var(--mono)}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}

  .brand .logo{height:22px;width:auto;display:block}
  .brand-sep{width:1px;height:24px;background:var(--line2);flex:none}
  /* ---------- Header ---------- */
  header.top{position:sticky;top:0;z-index:30;background:rgba(250,248,243,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top-in{display:flex;align-items:center;gap:22px;padding:0 26px;height:60px;max-width:1320px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .mk{width:34px;height:34px;border-radius:9px;border:1px solid rgba(196,168,117,.35);background:rgba(196,168,117,.1);display:grid;place-items:center;font-family:var(--serif);font-weight:700;color:var(--corp2)}
  .brand b{font-family:var(--serif);font-size:15.5px;letter-spacing:.2px}
  .brand small{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:1px}
  nav.main{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
  nav.main button{background:none;border:0;color:var(--muted);font:inherit;font-size:13.5px;padding:8px 13px;border-radius:9px;cursor:pointer;position:relative;transition:.15s}
  nav.main button:hover{color:var(--ink);background:rgba(0,0,0,.04)}
  nav.main button.active{color:var(--ink)}
  nav.main button.active::after{content:"";position:absolute;left:13px;right:13px;bottom:2px;height:2px;border-radius:2px;background:var(--acc)}

  /* ---------- Subtabs (líneas) ---------- */
  .subtabs{border-bottom:1px solid var(--line);background:var(--bg2)}
  .subtabs-in{display:flex;gap:8px;padding:11px 26px;max-width:1320px;margin:0 auto;flex-wrap:wrap}
  .subtab{display:flex;align-items:center;gap:9px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);
    padding:8px 15px;border-radius:99px;cursor:pointer;font:inherit;font-size:13px;transition:.15s}
  .subtab .dot{width:8px;height:8px;border-radius:99px;background:var(--neutral)}
  .subtab:hover{color:var(--ink)}
  .subtab.active{color:var(--ink);background:var(--surface2)}
  .subtab[data-l="wx180"].active{border-color:rgba(224,149,78,.5);box-shadow:0 0 0 1px rgba(224,149,78,.25) inset}
  .subtab[data-l="wx180"] .dot{background:var(--wx)}
  .subtab[data-l="vr"].active{border-color:rgba(79,176,207,.5);box-shadow:0 0 0 1px rgba(79,176,207,.25) inset}
  .subtab[data-l="vr"] .dot{background:var(--vr)}
  .subtab[data-l="comparador"].active{border-color:rgba(196,168,117,.5)}
  .subtab[data-l="comparador"] .dot{background:var(--corp)}

  /* ---------- Shell ---------- */
  .shell{max-width:1320px;margin:0 auto;padding:26px;display:grid;grid-template-columns:248px 1fr;gap:30px;align-items:start}
  aside.rail{position:sticky;top:84px}
  .rail h4{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin:0 0 10px 8px}
  .rail .acc-bar{height:3px;width:34px;border-radius:3px;background:var(--acc);margin:0 0 14px 8px}
  .rail ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
  .rail li button{width:100%;text-align:left;background:none;border:0;color:var(--muted);font:inherit;font-size:13.5px;
    padding:8px 11px;border-radius:9px;cursor:pointer;display:flex;gap:10px;align-items:baseline;transition:.13s;position:relative}
  .rail li button:hover{background:rgba(0,0,0,.035);color:var(--ink)}
  .rail li button.active{background:rgba(0,0,0,.06);color:var(--ink)}
  .rail li button.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:15px;border-radius:2px;background:var(--acc)}
  .rail li button .n{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .rail li button.active .n{color:var(--acc)}

  main.content{min-width:0}
  .page-head{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
  .page-head .eyebrow{margin-bottom:9px}
  .page-head h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.12;letter-spacing:-.4px;margin:0}
  .page-head p.lede{color:var(--muted);font-size:16px;line-height:1.55;margin:11px 0 0;max-width:64ch}
  .line-chip{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--line2);border-radius:99px;padding:4px 11px;color:var(--muted);margin-bottom:14px}
  .line-chip .dot{width:7px;height:7px;border-radius:99px;background:var(--acc)}

  /* ---------- Submodule sections ---------- */
  section.sub{margin-bottom:30px;scroll-margin-top:140px}
  section.sub > h2{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:-.2px;margin:0 0 4px;display:flex;align-items:baseline;gap:11px}
  section.sub > h2 .sn{font-family:var(--mono);font-size:12px;color:var(--acc)}
  .sub-rule{height:1px;background:var(--line);margin:13px 0 17px}

  /* ---------- Blocks ---------- */
  .blk-h3{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
  .blk-h3:first-child{margin-top:0}
  .blk-h3 .d{width:18px;height:2px;border-radius:2px;background:var(--acc);flex:none}
  .blk-h3.l-wx .d{background:var(--wx)} .blk-h3.l-wx{color:var(--wx)}
  .blk-h3.l-vr .d{background:var(--vr)} .blk-h3.l-vr{color:var(--vr)}
  .lead{font-family:var(--serif);font-size:19.5px;line-height:1.55;color:var(--ink);margin:0 0 14px}
  p.b{color:var(--muted);font-size:16.5px;line-height:1.65;margin:0 0 12px;max-width:74ch}
  ul.b{margin:0 0 14px;padding:0;list-style:none;max-width:78ch}
  ul.b li{position:relative;padding:6px 0 6px 20px;font-size:16px;line-height:1.55;color:var(--ink);border-bottom:1px solid var(--line)}
  ul.b li:last-child{border-bottom:0}
  ul.b li::before{content:"";position:absolute;left:2px;top:13px;width:6px;height:6px;border-radius:2px;background:var(--acc);opacity:.8}

  .grid{display:grid;gap:13px}
  .grid.c2{grid-template-columns:repeat(2,1fr)}
  .grid.c3{grid-template-columns:repeat(3,1fr)}
  .card{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:16px 17px}
  .card:hover{border-color:var(--line2)}
  .card .ct{font-weight:600;font-size:14.5px;margin:9px 0 6px;color:var(--ink)}
  .card .cx{color:var(--muted);font-size:14.5px;line-height:1.55}

  /* tags */
  .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:99px;border:1px solid;white-space:nowrap}
  .tag::before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor}
  .t-referencia{color:var(--t-referencia);border-color:color-mix(in srgb,var(--t-referencia) 38%,transparent);background:color-mix(in srgb,var(--t-referencia) 11%,transparent)}
  .t-benchmark{color:var(--t-benchmark);border-color:color-mix(in srgb,var(--t-benchmark) 38%,transparent);background:color-mix(in srgb,var(--t-benchmark) 11%,transparent)}
  .t-hipotesis{color:var(--t-hipotesis);border-color:color-mix(in srgb,var(--t-hipotesis) 38%,transparent);background:color-mix(in srgb,var(--t-hipotesis) 11%,transparent)}
  .t-decision{color:var(--t-decision);border-color:color-mix(in srgb,var(--t-decision) 38%,transparent);background:color-mix(in srgb,var(--t-decision) 11%,transparent)}
  .t-senal{color:var(--t-senal);border-color:color-mix(in srgb,var(--t-senal) 38%,transparent);background:color-mix(in srgb,var(--t-senal) 11%,transparent)}
  .t-riesgo{color:var(--t-riesgo);border-color:color-mix(in srgb,var(--t-riesgo) 38%,transparent);background:color-mix(in srgb,var(--t-riesgo) 11%,transparent)}
  .t-supuesto{color:var(--t-supuesto);border-color:color-mix(in srgb,var(--t-supuesto) 38%,transparent);background:color-mix(in srgb,var(--t-supuesto) 11%,transparent)}
  .t-criterio{color:var(--t-criterio);border-color:color-mix(in srgb,var(--t-criterio) 38%,transparent);background:color-mix(in srgb,var(--t-criterio) 11%,transparent)}
  .t-pendiente{color:var(--t-pendiente);border-color:color-mix(in srgb,var(--t-pendiente) 38%,transparent);background:color-mix(in srgb,var(--t-pendiente) 11%,transparent)}

  /* key-value list */
  dl.kv{margin:0 0 14px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  dl.kv .row{display:grid;grid-template-columns:210px 1fr;gap:18px;padding:11px 16px;border-bottom:1px solid var(--line);align-items:baseline}
  dl.kv .row:last-child{border-bottom:0}
  dl.kv dt{color:var(--muted);font-size:13px;font-family:var(--mono);font-size:11.5px;letter-spacing:.02em}
  dl.kv dd{margin:0;color:var(--ink);font-size:15px}
  dl.kv dd .note{color:var(--faint);font-size:12.5px;display:block;margin-top:2px;font-family:var(--sans)}

  /* tables */
  .tbl-wrap{border:1px solid var(--line);border-radius:var(--radius);overflow:auto;margin-bottom:14px}
  table{border-collapse:collapse;width:100%;font-size:14.5px;min-width:520px}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink)}
  thead th{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);background:var(--bg2);position:sticky;top:0}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:rgba(0,0,0,.02)}
  td.dim{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
  .col-wx{color:var(--ink)}.col-vr{color:var(--ink)}
  thead th.col-wx{color:var(--wx)}thead th.col-vr{color:var(--vr)}
  table.cmp td:nth-child(2){border-left:1px solid var(--line)}
  table.cmp th:nth-child(2){border-left:1px solid var(--line)}

  /* callout */
  .callout{border:1px solid var(--line2);border-left:3px solid var(--acc);background:var(--surface);border-radius:10px;padding:14px 16px;margin:0 0 14px}
  .callout .ct{font-weight:600;margin:8px 0 5px}
  .callout .cx{color:var(--muted);font-size:14.5px;line-height:1.55}

  /* go / no-go */
  .gng{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
  .gng .col{border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;background:var(--surface)}
  .gng .col.go{border-color:rgba(90,168,136,.32)}
  .gng .col.no{border-color:rgba(203,111,111,.32)}
  .gng h5{margin:0 0 10px;font-size:13px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
  .gng .go h5{color:var(--t-decision)}.gng .no h5{color:var(--t-riesgo)}
  .gng ul{list-style:none;margin:0;padding:0}
  .gng li{padding:6px 0 6px 18px;position:relative;font-size:14.5px;color:var(--ink);border-bottom:1px solid var(--line)}
  .gng li:last-child{border-bottom:0}
  .gng .go li::before{content:"+";position:absolute;left:0;color:var(--t-decision)}
  .gng .no li::before{content:"–";position:absolute;left:0;color:var(--t-riesgo)}

  /* semaforo */
  .sem{display:flex;align-items:center;gap:9px;font-size:13.5px}
  .sem .lt{width:10px;height:10px;border-radius:99px;flex:none}
  .lt.g{background:var(--t-decision)}.lt.a{background:#cda257}.lt.r{background:var(--t-riesgo)}

  /* accordion */
  details.acc{border:1px solid var(--line);border-radius:11px;background:var(--surface);margin-bottom:10px;overflow:hidden}
  details.acc>summary{cursor:pointer;list-style:none;padding:13px 16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px}
  details.acc>summary::-webkit-details-marker{display:none}
  details.acc>summary::before{content:"+";font-family:var(--mono);color:var(--acc);font-size:15px;width:14px}
  details.acc[open]>summary::before{content:"–"}
  details.acc .body{padding:2px 16px 15px}

  .cards-tag{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 14px}

  footer.legend{border-top:1px solid var(--line);margin-top:24px}
  .legend-in{max-width:1320px;margin:0 auto;padding:16px 26px;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
  .legend-in span.lab{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-right:6px}

  @media(max-width:980px){
    .top-in{height:auto;min-height:60px;flex-wrap:wrap;gap:12px;padding:8px 18px}
    nav.main{margin-left:auto}
    .shell{grid-template-columns:1fr;gap:16px;padding:20px 18px}
    aside.rail{position:static}
    .rail .acc-bar{display:none}
    .rail ul{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:4px}
    .rail li button{white-space:nowrap}
    .rail li button.active::before{display:none}
    .grid.c2,.grid.c3{grid-template-columns:1fr}
    .gng{grid-template-columns:1fr}
    dl.kv .row{grid-template-columns:1fr;gap:3px}
  }
  @media(max-width:600px){
    .top-in{flex-direction:column;align-items:stretch;gap:9px;padding:9px 14px}
    .brand{justify-content:flex-start}
    .brand b{font-size:14.5px}
    .brand small{font-size:9px}
    nav.main{margin-left:0;width:100%;flex-wrap:nowrap;overflow-x:auto;gap:2px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
    nav.main::-webkit-scrollbar{height:0}
    nav.main button{white-space:nowrap;flex:0 0 auto;font-size:13px;padding:7px 10px}
    .shell{padding:16px 13px;gap:14px}
    .page-head{padding-bottom:14px;margin-bottom:18px}
    .page-head h1{font-size:23px;line-height:1.15}
    .page-head p.lede{font-size:15px}
    .line-chip{margin-bottom:11px}
    .lead{font-size:17px}
    section.sub{margin-bottom:20px}
    .card{padding:14px 15px}
    .callout{padding:13px 14px}
    .kv .row{padding:10px 13px}
    .usr-form{flex-direction:column;align-items:stretch}
    .usr-form input,.usr-form .usr-btn{width:100%;min-width:0}
    .usr-chk{justify-content:flex-start}
    #userbar{bottom:10px;left:10px}
    #userbar button{font-size:11px;padding:5px 9px}
    #gate{padding:16px}
    #gate .box{padding:26px 22px}
    #pwdModal .pm-box{padding:22px}
  }

  /* ---------- Cancela de acceso (gate) ---------- */
  #gate{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1100px 540px at 82% -8%, rgba(154,125,63,.07), transparent 60%), var(--bg)}
  #gate.hidden{display:none}
  #gate .box{width:100%;max-width:368px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:32px 30px;box-shadow:0 14px 44px rgba(0,0,0,.09)}
  #gate .gt-logo{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.2px;color:var(--ink)}
  #gate .gt-sub{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:4px 0 24px}
  #gate label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 5px}
  #gate input{width:100%;padding:10px 12px;margin-bottom:15px;border:1px solid var(--line2);border-radius:9px;background:#fff;color:var(--ink);font:inherit;font-size:15px}
  #gate input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  #gate button{width:100%;padding:11px;border:0;border-radius:9px;background:var(--ink);color:#fff;font:inherit;font-weight:600;font-size:15px;cursor:pointer;transition:.15s}
  #gate button:hover{background:#000}
  #gate .gt-err{color:var(--t-riesgo);font-size:13px;min-height:18px;margin-top:11px;text-align:center}
  #gate .gt-foot{margin-top:18px;text-align:center;font-size:11px;color:var(--faint)}
  #userbar{position:fixed;bottom:14px;left:14px;z-index:40;display:none;gap:8px}
  body.authed #userbar{display:flex}
  #userbar button{background:var(--surface);border:1px solid var(--line2);border-radius:8px;padding:6px 12px;font:inherit;font-size:12px;color:var(--muted);cursor:pointer}
  #userbar button:hover{color:var(--ink);border-color:var(--acc)}
  /* modal cambiar contraseña */
  #pwdModal{position:fixed;inset:0;z-index:1100;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(20,20,20,.35)}
  #pwdModal.open{display:flex}
  #pwdModal .pm-box{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 14px 44px rgba(0,0,0,.18)}
  #pwdModal h3{margin:0 0 4px;font-family:var(--serif);font-size:18px;color:var(--ink)}
  #pwdModal p.pm-lead{margin:0 0 16px;font-size:13px;color:var(--muted)}
  #pwdModal input{width:100%;padding:10px 12px;margin-bottom:12px;border:1px solid var(--line2);border-radius:9px;background:#fff;color:var(--ink);font:inherit;font-size:15px}
  #pwdModal input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  #pwdModal .pm-msg{font-size:13px;min-height:16px;margin-bottom:6px;color:var(--muted)}
  #pwdModal .pm-msg.ok{color:var(--t-decision)} #pwdModal .pm-msg.err{color:var(--t-riesgo)}
  #pwdModal .pm-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  #pwdModal .pm-row button{padding:9px 15px;border-radius:9px;font:inherit;font-size:14px;font-weight:600;cursor:pointer}
  #pwdModal .pm-save{border:0;background:var(--ink);color:#fff}
  #pwdModal .pm-cancel{border:1px solid var(--line2);background:var(--surface);color:var(--muted)}
  .usr-reset{padding:5px 11px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:7px;font:inherit;font-size:12.5px;cursor:pointer;margin-right:6px}
  .usr-reset:hover{color:var(--ink);border-color:var(--acc)}

  /* ---------- Panel de usuarios ---------- */
  .usr-new{margin-bottom:18px}
  .usr-h{font-weight:600;font-size:15px;color:var(--ink);margin-bottom:12px}
  .usr-form{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .usr-form input[type=email],.usr-form input[type=text]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line2);border-radius:9px;background:#fff;color:var(--ink);font:inherit;font-size:14px}
  .usr-form input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  .usr-chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);white-space:nowrap}
  .usr-btn{padding:9px 16px;border:0;border-radius:9px;background:var(--ink);color:#fff;font:inherit;font-weight:600;font-size:14px;cursor:pointer}
  .usr-btn:hover{background:#000}
  .usr-msg{font-size:13px;margin-top:10px;min-height:16px;color:var(--muted)}
  .usr-msg.ok{color:var(--t-decision)} .usr-msg.err{color:var(--t-riesgo)}
  table.usr-tbl td,table.usr-tbl th{font-size:14px}
  .usr-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:99px;border:1px solid var(--line2);color:var(--muted)}
  .usr-badge.admin{color:var(--t-criterio);border-color:color-mix(in srgb,var(--t-criterio) 40%,transparent);background:color-mix(in srgb,var(--t-criterio) 12%,transparent)}
  .usr-you{font-size:12px;color:var(--faint)}
  .usr-del{padding:5px 11px;border:1px solid color-mix(in srgb,var(--t-riesgo) 35%,transparent);background:color-mix(in srgb,var(--t-riesgo) 8%,transparent);color:var(--t-riesgo);border-radius:7px;font:inherit;font-size:12.5px;cursor:pointer}
  .usr-del:hover{background:color-mix(in srgb,var(--t-riesgo) 16%,transparent)}
</style>

<script>
/* =====================================================================
   wowinX Spatial Business OS — datos + render (sin build, sin backend)
   Estructura central: vision, wx180, vrExperiences, marketIntel,
   economics, decisionCockpit (+ comparator).
   Cada bloque de contenido se etiqueta con su naturaleza para mantener
   la disciplina: dato de referencia / benchmark / hipótesis / decisión
   tomada / señal de mercado / riesgo / supuesto / criterio.
   ===================================================================== */

var TAGS = {
  referencia:'Dato de referencia', benchmark:'Benchmark', hipotesis:'Hipótesis',
  decision:'Decisión tomada', senal:'Señal de mercado', riesgo:'Riesgo',
  supuesto:'Supuesto', criterio:'Criterio', pendiente:'Pendiente de validar'
};

/* ---- helpers de bloque ---- */
var b = {
  lead:function(x){return {t:'lead',x:x}},
  p:function(x){return {t:'p',x:x}},
  list:function(x){return {t:'list',x:x}},
  kv:function(x){return {t:'kv',x:x}},
  cards:function(x,cols){return {t:'cards',x:x,cols:cols||2}},
  table:function(head,rows,cls){return {t:'table',head:head,rows:rows,cls:cls||''}},
  callout:function(tag,title,text){return {t:'callout',tag:tag,title:title,text:text}},
  gonogo:function(go,no){return {t:'gonogo',go:go,no:no}},
  acc:function(items){return {t:'acc',x:items}},
  sem:function(rows){return {t:'sem',rows:rows}},
  h3:function(x,line){return {t:'h3',x:x,line:line||''}}
};

var DATA = null; // El contenido se carga desde Supabase tras autenticar (protección real)

/* ===================== Navegación ===================== */
var MAIN_NAV = [
  {id:'estado',   label:'Dónde estamos'},
  {id:'mercado',  label:'El mercado'},
  {id:'oferta',   label:'Qué vendemos'},
  {id:'venta',    label:'Cómo se vende'},
  {id:'decision', label:'Decisiones'}
];
var LINE_TABS = [];
/* mapeo área -> clave de datos */
function viewKey(area){
  if(area==='mercado')  return 'mercado';
  if(area==='oferta')   return 'oferta';
  if(area==='venta')    return 'venta';
  if(area==='decision') return 'decision';
  return 'estado';
}
var ACCENTS = {corp:'var(--corp)', wx:'var(--wx)', vr:'var(--vr)'};

/* ---- estado por hash: #area[/line][/sub] ---- */
function parseHash(){
  var raw = (location.hash||'').replace(/^#/,'');
  var parts = raw.split('/').filter(Boolean);
  var area = parts[0]||'estado';
  if(area!=='usuarios' && !MAIN_NAV.some(function(n){return n.id===area})) area='estado';
  var line=null, sub=parts[1]||null;
  return {area:area, line:line, sub:sub};
}
function go(area, line, sub){
  var h='#'+area;
  if(area==='lineas'){ h+='/'+(line||'wx180'); if(sub) h+='/'+sub; }
  else if(sub){ h+='/'+sub; }
  location.hash=h;
}

/* ===================== Render de bloques ===================== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tagHtml(tag){ if(!tag) return ''; return '<span class="tag t-'+tag+'">'+esc(TAGS[tag]||tag)+'</span>'; }

function renderBlock(bl){
  switch(bl.t){
    case 'h3': return '<h3 class="blk-h3'+(bl.line?' l-'+bl.line:'')+'"><span class="d"></span>'+esc(bl.x)+'</h3>';
    case 'lead': return '<p class="lead">'+esc(bl.x)+'</p>';
    case 'p': return '<p class="b">'+esc(bl.x)+'</p>';
    case 'list': return '<ul class="b">'+bl.x.map(function(i){return '<li>'+esc(i)+'</li>'}).join('')+'</ul>';
    case 'kv':
      return '<dl class="kv">'+bl.x.map(function(r){
        return '<div class="row"><dt>'+esc(r.k)+'</dt><dd>'+esc(r.v)+(r.note?'<span class="note">'+esc(r.note)+'</span>':'')+'</dd></div>';
      }).join('')+'</dl>';
    case 'cards':
      return '<div class="grid c'+(bl.cols||2)+'">'+bl.x.map(function(c){
        return '<div class="card">'+tagHtml(c.tag)+'<div class="ct">'+esc(c.title)+'</div><div class="cx">'+esc(c.text)+'</div></div>';
      }).join('')+'</div>';
    case 'table':
      var head='<tr>'+bl.head.map(function(h,i){return '<th'+(i===1&&bl.cls==='cmp'?' class="col-wx"':(i===2&&bl.cls==='cmp'?' class="col-vr"':''))+'>'+esc(h)+'</th>'}).join('')+'</tr>';
      var body=bl.rows.map(function(r){
        return '<tr>'+r.map(function(cell,i){
          if(i===0) return '<td class="dim">'+esc(cell)+'</td>';
          var cls = bl.cls==='cmp'?(i===1?' class="col-wx"':' class="col-vr"'):'';
          return '<td'+cls+'>'+esc(cell)+'</td>';
        }).join('')+'</tr>';
      }).join('');
      return '<div class="tbl-wrap"><table class="'+bl.cls+'"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
    case 'callout':
      return '<div class="callout">'+tagHtml(bl.tag)+'<div class="ct">'+esc(bl.title)+'</div><div class="cx">'+esc(bl.text)+'</div></div>';
    case 'gonogo':
      return '<div class="gng"><div class="col go"><h5>Go</h5><ul>'+bl.go.map(function(i){return '<li>'+esc(i)+'</li>'}).join('')+
        '</ul></div><div class="col no"><h5>No-go</h5><ul>'+bl.no.map(function(i){return '<li>'+esc(i)+'</li>'}).join('')+'</ul></div></div>';
    case 'sem':
      return '<div class="card" style="display:flex;flex-direction:column;gap:11px">'+bl.rows.map(function(r){
        return '<div class="sem"><span class="lt '+r[0]+'"></span><span>'+esc(r[1])+'</span></div>';
      }).join('')+'</div>';
    case 'acc':
      return bl.x.map(function(it){
        return '<details class="acc"><summary>'+esc(it.s)+'</summary><div class="body">'+it.b.map(renderBlock).join('')+'</div></details>';
      }).join('');
    default: return '';
  }
}

/* ===================== Render principal ===================== */
function render(){
  var st=parseHash();

  /* nav superior (incluye Usuarios solo para admin) */
  var navItems = MAIN_NAV.map(function(n){
    return '<button class="'+(st.area===n.id?'active':'')+'" onclick="go(\''+n.id+'\')">'+n.label+'</button>';
  });
  if(document.body.classList.contains('is-admin')){
    navItems.push('<button class="'+(st.area==='usuarios'?'active':'')+'" onclick="go(\'usuarios\')">Usuarios</button>');
  }
  document.getElementById('mainnav').innerHTML = navItems.join('');

  if(st.area==='usuarios'){ document.getElementById('subtabs').innerHTML=''; renderUsuarios(); return; }
  if(!DATA){ document.getElementById('rail').innerHTML=''; document.getElementById('content').innerHTML=''; return; }

  var key=viewKey(st.area, st.line);
  var view=DATA[key];
  document.documentElement.style.setProperty('--acc', ACCENTS[view.accent]||'var(--corp)');
  document.documentElement.style.setProperty('--acc-soft', view.accent==='wx'?'var(--wx-soft)':(view.accent==='vr'?'var(--vr-soft)':'rgba(196,168,117,.12)'));

  /* subtabs (solo en líneas) */
  var stEl=document.getElementById('subtabs');
  if(st.area==='lineas'){
    stEl.innerHTML='<div class="subtabs"><div class="subtabs-in">'+LINE_TABS.map(function(t){
      return '<button class="subtab '+(st.line===t.l?'active':'')+'" data-l="'+t.l+'" onclick="go(\'lineas\',\''+t.l+'\')"><span class="dot"></span>'+t.label+'</button>';
    }).join('')+'</div></div>';
  } else { stEl.innerHTML=''; }

  /* sub seleccionado */
  var subs=view.submodules;
  var current = st.sub && subs.some(function(s){return s.id===st.sub}) ? st.sub : subs[0].id;

  /* rail */
  document.getElementById('rail').innerHTML =
    '<h4>'+esc(view.title)+'</h4><div class="acc-bar"></div><ul>'+
    subs.map(function(s,i){
      var n=String(i+1).padStart(2,'0');
      var onclick = st.area==='lineas'
        ? 'go(\'lineas\',\''+st.line+'\',\''+s.id+'\')'
        : 'go(\''+st.area+'\',null,\''+s.id+'\')';
      return '<li><button class="'+(s.id===current?'active':'')+'" onclick="'+onclick+'"><span class="n">'+n+'</span>'+esc(s.title)+'</button></li>';
    }).join('')+'</ul>';

  /* contenido */
  var sub=subs.filter(function(s){return s.id===current})[0];
  var idx=subs.indexOf(sub)+1;
  var lineChip='';
  if(view.line==='wx180') lineChip='<div class="line-chip" style="--acc:var(--wx)"><span class="dot"></span>Línea · Vídeo inmersivo 180º</div>';
  else if(view.line==='vr') lineChip='<div class="line-chip" style="--acc:var(--vr)"><span class="dot"></span>Línea · BeFootball (VR)</div>';
  else if(view.line==='comparador') lineChip='<div class="line-chip"><span class="dot"></span>Contraste de líneas</div>';

  var head='<div class="page-head">'+lineChip+
           '<div class="eyebrow">'+esc(view.title)+' · módulo '+String(idx).padStart(2,'0')+' / '+String(subs.length).padStart(2,'0')+'</div>'+
           '<h1>'+esc(sub.title)+'</h1>'+
           (idx===1?'<p class="lede">'+esc(view.lede)+'</p>':'')+'</div>';

  var body='<section class="sub"><div class="sub-rule" style="margin-top:0"></div>'+
           sub.blocks.map(renderBlock).join('')+'</section>';

  document.getElementById('content').innerHTML=head+body;
  window.scrollTo(0,0);
}

const SB_URL='https://osekocswbfcaiyyimvvu.supabase.co';

function showGate(){
  document.getElementById('gate').classList.remove('hidden');
  document.body.classList.remove('authed','is-admin');

async function onAuthed(session){
  CURRENT_USER = session.user;
  var isAdmin = !!(CURRENT_USER.app_metadata && CURRENT_USER.app_metadata.is_admin===true);
  document.body.classList.toggle('is-admin', isAdmin);
  var res = await sb.from('bos_content').select('data').eq('id',1).single();
  if(res.error){ document.getElementById('gErr').textContent='No se pudo cargar el contenido: '+res.error.message; return; }
  DATA = res.data.data;
  document.getElementById('gate').classList.add('hidden');
  document.body.classList.add('authed');
  if(!location.hash) location.hash='#estado';
  render();
}

(async function boot(){
  try{

    if(s.data && s.data.session){ await onAuthed(s.data.session); return; }

})();

/* ===================== Panel de usuarios (solo admin) ===================== */
async function fnUsuarios(payload){
  var s = await sb.auth.getSession();
  var token = (s.data && s.data.session) ? s.data.session.access_token : '';
  var r = await fetch(FN_USUARIOS, { method:'POST', headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+token, 'Content-Type':'application/json' }, body: JSON.stringify(payload) });
  var j = await r.json().catch(function(){ return {error:'Respuesta no válida'}; });
  if(!r.ok) throw new Error(j.error||('Error '+r.status));
  return j;
}

function renderUsuarios(){
  document.documentElement.style.setProperty('--acc','var(--corp)');
  document.getElementById('rail').innerHTML='<h4>Administración</h4><div class="acc-bar"></div><ul><li><button class="active"><span class="n">01</span>Usuarios</button></li></ul>';
  document.getElementById('content').innerHTML=
    '<div class="page-head"><div class="eyebrow">Administración · solo admin</div><h1>Usuarios</h1>'+
    '<p class="lede">Da de alta, revisa y elimina a las personas que pueden entrar al portal.</p></div>'+
    '<div class="card usr-new"><div class="usr-h">Nuevo usuario</div>'+
      '<div class="usr-form">'+
        '<input id="nu_email" type="email" placeholder="email@wowinx.com" autocomplete="off" />'+
        '<input id="nu_pass" type="text" placeholder="contraseña (mín. 8)" autocomplete="off" />'+
        '<label class="usr-chk"><input id="nu_admin" type="checkbox" /> admin</label>'+
        '<button id="nu_btn" class="usr-btn">Crear</button>'+
      '</div><div class="usr-msg" id="nu_msg"></div></div>'+
    '<div id="usr_list"><p class="b">Cargando…</p></div>';
  document.getElementById('nu_btn').addEventListener('click', crearUsuario);
  cargarUsuarios();
}

async function cargarUsuarios(){
  var box=document.getElementById('usr_list');
  try{
    var j=await fnUsuarios({action:'list'});
    var users=(j.users||[]).sort(function(a,b){ return (a.email||'').localeCompare(b.email||''); });
    box.innerHTML='<div class="tbl-wrap"><table class="usr-tbl"><thead><tr><th>Email</th><th>Rol</th><th>Último acceso</th><th></th></tr></thead><tbody>'+
      users.map(function(u){
        var last=u.last_sign_in_at?new Date(u.last_sign_in_at).toLocaleDateString('es-ES'):'—';
        var rol=u.is_admin?'<span class="usr-badge admin">admin</span>':'<span class="usr-badge">usuario</span>';
        var act;
        if(CURRENT_USER && u.id===CURRENT_USER.id){
          act='<span class="usr-you">tú</span>';
        } else {
          act='<button class="usr-reset" data-id="'+u.id+'" data-email="'+esc(u.email)+'">Resetear clave</button>'+
              '<button class="usr-del" data-id="'+u.id+'" data-email="'+esc(u.email)+'">Borrar</button>';
        }
        return '<tr><td>'+esc(u.email)+'</td><td>'+rol+'</td><td class="dim">'+last+'</td><td style="text-align:right;white-space:nowrap">'+act+'</td></tr>';
      }).join('')+'</tbody></table></div>';
    Array.prototype.forEach.call(box.querySelectorAll('.usr-del'), function(btn){
      btn.addEventListener('click', function(){ borrarUsuario(btn.getAttribute('data-id'), btn.getAttribute('data-email')); });
    });
    Array.prototype.forEach.call(box.querySelectorAll('.usr-reset'), function(btn){
      btn.addEventListener('click', async function(){
        var np=window.prompt('Nueva contraseña para '+btn.getAttribute('data-email')+' (mín. 8 caracteres):');
        if(np===null) return;
        if(np.length<8){ window.alert('Mínimo 8 caracteres.'); return; }
        try{ await fnUsuarios({action:'set_password', id:btn.getAttribute('data-id'), password:np}); window.alert('Contraseña actualizada para '+btn.getAttribute('data-email')+'.'); }
        catch(e){ window.alert('No se pudo cambiar: '+e.message); }
      });
    });
  }catch(e){ box.innerHTML='<div class="usr-msg err">'+esc(e.message)+'</div>'; }
}

async function crearUsuario(){
  var email=document.getElementById('nu_email').value.trim();
  var pass=document.getElementById('nu_pass').value;
  var isAdmin=document.getElementById('nu_admin').checked;
  var msg=document.getElementById('nu_msg');
  msg.className='usr-msg'; msg.textContent='Creando…';
  try{
    await fnUsuarios({action:'create', email:email, password:pass, is_admin:isAdmin});
    msg.className='usr-msg ok'; msg.textContent='Usuario creado: '+email;
    document.getElementById('nu_email').value=''; document.getElementById('nu_pass').value=''; document.getElementById('nu_admin').checked=false;
    cargarUsuarios();
  }catch(e){ msg.className='usr-msg err'; msg.textContent=e.message; }
}

async function borrarUsuario(id, email){
  if(!window.confirm('¿Borrar a '+email+'? Perderá el acceso al portal.')) return;
  try{ await fnUsuarios({action:'delete', id:id}); cargarUsuarios(); }
  catch(e){ window.alert('No se pudo borrar: '+e.message); }
}
